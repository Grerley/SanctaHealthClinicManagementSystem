# Deploy the all-Cloudflare app (Worker + PWA on D1) from GitHub.
#
# This is the ONLY place the D1 database is touched by a machine: the pipeline
# creates the database if it does not exist, resolves its id, runs
# `wrangler d1 migrations apply --remote` (forward-only, tracked) and then
# `wrangler deploy`. No human hand-edits the database, and nobody runs anything
# locally — schema is code and provisioning is automated here.
#
# Required repo configuration (Settings → Secrets and variables → Actions):
#   Secrets:   CLOUDFLARE_API_TOKEN   (scoped: Workers Scripts:Edit, D1:Edit)
#   Secrets:   CLOUDFLARE_ACCOUNT_ID
#
# That's it — the D1 database id is discovered/created at deploy time, so there
# is no CLOUDFLARE_D1_DATABASE_ID to set and nothing to run on your machine.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Build the PWA that the Worker serves as static assets.
      - name: Build PWA
        run: npm run build -w @sancta/clinic-web

      # Ensure the D1 database exists and resolve its id (idempotent: created on the
      # first deploy, reused on every deploy after). No local `wrangler d1 create`
      # is ever needed — this is the single source of provisioning.
      - name: Ensure D1 database
        id: d1
        working-directory: apps/worker
        run: |
          set -euo pipefail
          db_id="$(npx -y wrangler d1 list --json | jq -r '.[] | select(.name=="sancta") | .uuid')"
          if [ -z "$db_id" ] || [ "$db_id" = "null" ]; then
            echo "D1 database 'sancta' not found — creating it."
            npx -y wrangler d1 create sancta
            db_id="$(npx -y wrangler d1 list --json | jq -r '.[] | select(.name=="sancta") | .uuid')"
          fi
          if [ -z "$db_id" ] || [ "$db_id" = "null" ]; then
            echo "Failed to resolve the D1 database id after create." >&2
            exit 1
          fi
          echo "Using D1 database id: $db_id"
          echo "db_id=$db_id" >> "$GITHUB_OUTPUT"

      # Inject the resolved D1 database id into the Worker config for this run.
      - name: Configure D1 database id
        run: sed -i "s/REPLACE_WITH_D1_DATABASE_ID/${{ steps.d1.outputs.db_id }}/" apps/worker/wrangler.toml

      # Apply pending D1 migrations to the REMOTE database (forward-only, idempotent).
      - name: Apply D1 migrations
        working-directory: apps/worker
        run: npx -y wrangler d1 migrations apply sancta --remote

      # Load the bulk synthetic demo data (SYNTHETIC ONLY — no real PHI) so every
      # screen renders with realistic volume. INSERT OR IGNORE + fixed ids make this
      # idempotent, so re-running on each deploy never duplicates. Kept out of the
      # migrations dir so the curated D1 test fixtures stay exact.
      - name: Load synthetic demo data
        working-directory: apps/worker
        run: npx -y wrangler d1 execute sancta --remote --file=../../seed/d1-bulk-demo.sql

      # Ship the Worker + static assets as one versioned release.
      - name: Deploy Worker
        working-directory: apps/worker
        run: npx -y wrangler deploy
