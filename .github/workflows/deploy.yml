# Deploy the all-Cloudflare app (Worker + PWA on D1) from GitHub.
#
# This is the ONLY place the D1 database is touched by a machine: the pipeline runs
# `wrangler d1 migrations apply --remote` (forward-only, tracked) and then
# `wrangler deploy`. No human hand-edits the database; schema is code.
#
# Required repo configuration (Settings → Secrets and variables → Actions):
#   Secrets:   CLOUDFLARE_API_TOKEN      (scoped: Workers Scripts:Edit, D1:Edit, Workers KV:Edit if used)
#   Secrets:   CLOUDFLARE_ACCOUNT_ID
#   Variables: CLOUDFLARE_D1_DATABASE_ID (the id from `wrangler d1 create sancta`; not secret)
#
# One-time before the first run: create the database with `wrangler d1 create sancta`
# and put its id in the CLOUDFLARE_D1_DATABASE_ID variable.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Build the PWA that the Worker serves as static assets.
      - name: Build PWA
        run: npm run build -w @sancta/clinic-web

      # Inject the (non-secret) D1 database id into the Worker config.
      - name: Configure D1 database id
        run: sed -i "s/REPLACE_WITH_D1_DATABASE_ID/${{ vars.CLOUDFLARE_D1_DATABASE_ID }}/" apps/worker/wrangler.toml

      # Apply pending D1 migrations to the REMOTE database (forward-only, idempotent).
      - name: Apply D1 migrations
        working-directory: apps/worker
        run: npx wrangler d1 migrations apply sancta --remote

      # Ship the Worker + static assets as one versioned release.
      - name: Deploy Worker
        working-directory: apps/worker
        run: npx wrangler deploy
