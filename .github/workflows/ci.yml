name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least-privilege token (pack §17 secure development).
permissions:
  contents: read

jobs:
  build-test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (all workspaces)
        run: npm run typecheck

      - name: Unit tests (domain invariants, sync, dispense)
        run: npm test

  integration:
    name: integration (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sancta
          POSTGRES_PASSWORD: sancta
          POSTGRES_DB: sancta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sancta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install PostgreSQL client (pg_dump/pg_restore for the backup/restore test)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-16 || sudo apt-get install -y postgresql-client
      - name: Integration tests (dispense→pay→journals→sync→replay, all modules, backup/restore UAT-16)
        run: npm run test:integration -w @sancta/clinic-edge
        env:
          DATABASE_URL: postgres://sancta:sancta@localhost:5432/sancta_test
          # The cloud store lives in an isolated `cloud` schema; one instance suffices in CI.
          CLOUD_DATABASE_URL: postgres://sancta:sancta@localhost:5432/sancta_test
          PG_BIN_DIR: /usr/lib/postgresql/16/bin

  e2e:
    name: e2e (PWA offline → dispense → pay → reconcile)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sancta
          POSTGRES_PASSWORD: sancta
          POSTGRES_DB: sancta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sancta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build the PWA
        run: npm run build -w @sancta/clinic-web
      - name: Install Playwright Chromium
        run: npx --workspace @sancta/clinic-web playwright install --with-deps chromium
      - name: Run offline-first E2E (SYN-001, UAT-01)
        run: npm run e2e -w @sancta/clinic-web
        env:
          DATABASE_URL: postgres://sancta:sancta@localhost:5432/sancta_test
          CLOUD_DATABASE_URL: postgres://sancta:sancta@localhost:5432/sancta_test

  # Reserved gates that expand as modules land (pack §22). Kept green so the
  # required-checks contract is stable while real suites are added per phase.
  future-gates:
    name: reserved gates (contract · security · e2e · a11y · offline-resilience)
    runs-on: ubuntu-latest
    steps:
      - run: echo "OpenAPI/FHIR contract, security (ASVS 5.0 L2), Playwright e2e + accessibility, and 72h offline-resilience suites are added per delivery phase (see docs/delivery/implementation-plan.md)."
