name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least-privilege token (pack §17 secure development).
permissions:
  contents: read

jobs:
  build-test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (all workspaces)
        run: npm run typecheck

      - name: Unit tests (domain invariants, sync, dispense)
        run: npm test

  # Placeholder gates that expand as modules land (pack §22). Kept green so the
  # required-checks contract is stable while real suites are added per phase.
  future-gates:
    name: reserved gates (integration · contract · security · e2e · a11y)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Integration (real PostgreSQL), OpenAPI/FHIR contract, security (ASVS 5.0 L2), Playwright e2e + accessibility, and offline-resilience suites are added per delivery phase (see docs/delivery/implementation-plan.md)."
